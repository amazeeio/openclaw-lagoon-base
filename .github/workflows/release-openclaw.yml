name: Release OpenClaw

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-openclaw
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Require release token
        env:
          OPENCLAW_RELEASE_TOKEN: ${{ secrets.OPENCLAW_RELEASE_TOKEN }}
        run: |
          if [ -z "$OPENCLAW_RELEASE_TOKEN" ]; then
            echo "OPENCLAW_RELEASE_TOKEN is not configured" >&2
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure authenticated remote
        env:
          OPENCLAW_RELEASE_TOKEN: ${{ secrets.OPENCLAW_RELEASE_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${OPENCLAW_RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --force --tags origin

      - name: Release latest OpenClaw version if needed
        run: ./scripts/release-openclaw.sh --push